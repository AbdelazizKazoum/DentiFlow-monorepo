version: "3.8"

networks:
  dentiflow-network:
    driver: bridge

volumes:
  db_data:

services:
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-m", "8222"]
    networks:
      - dentiflow-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      # MYSQL_DATABASE omitted — databases are created by the init script.
      TZ: UTC
    volumes:
      - db_data:/var/lib/mysql
      - ./services/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - dentiflow-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: 900
      AUTH_SERVICE_URL: http://auth-service:3002
      AUTH_SERVICE_GRPC_URL: auth-service:5001
      CLINIC_SERVICE_GRPC_URL: clinic-service:5002
      PATIENT_SERVICE_GRPC_URL: patient-service:5003
      APPOINTMENT_SERVICE_GRPC_URL: appointment-service:5004
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - auth-service
      - appointment-service
    networks:
      - dentiflow-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      LOG_LEVEL: info
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD}"
      # Each service has its own env var to avoid naming conflicts.
      DB_NAME: "${AUTH_DB_NAME:-auth_db}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: 900
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - db
    networks:
      - dentiflow-network

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3005
      LOG_LEVEL: info
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${APPOINTMENT_DB_NAME:-appointment_db}"
      GRPC_PORT: 5004
      PATIENT_SERVICE_GRPC_URL: patient-service:5003
      CLINIC_SERVICE_GRPC_URL: clinic-service:5002
      NATS_URL: nats://nats:4222
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      - db
      - nats
    networks:
      - dentiflow-network

# Notes:
# - Provide production secrets via environment or an external .env file when running.
# - Each service uses its own DB_NAME variable (AUTH_DB_NAME, etc.) — Database-per-Service pattern.
# - Example run:
#     MYSQL_ROOT_PASSWORD=... DB_PASSWORD=... JWT_SECRET=... AUTH_DB_NAME=auth_db \
#     docker compose -f docker-compose.prod.yml up --build -d
