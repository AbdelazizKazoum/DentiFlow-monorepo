syntax = "proto3";
package clinic;

service ClinicService {
  rpc GetClinic (GetClinicRequest) returns (ClinicReply);
  rpc GetStaffMember (GetStaffMemberRequest) returns (StaffMemberReply);
  rpc GetWorkingHours (GetWorkingHoursRequest) returns (WorkingHoursListReply);
  rpc CreateClinic (CreateClinicRequest) returns (ClinicReply);
  rpc UpsertWorkingHours (UpsertWorkingHoursRequest) returns (WorkingHoursListReply);
  rpc CreateStaffMember (CreateStaffMemberRequest) returns (StaffMemberReply);
  rpc ListStaffMembers (ListStaffMembersRequest) returns (StaffMembersListReply);
  rpc UpdateStaffMember (UpdateStaffMemberRequest) returns (StaffMemberReply);
  rpc DeleteStaffMember (DeleteStaffMemberRequest) returns (DeleteStaffMemberReply);
}

message GetClinicRequest {
  string id = 1;
}

message ClinicReply {
  string id = 1;
  string slug = 2;
  string name = 3;
  string timezone = 4;
  string locale = 5;
  bool is_active = 6;
}

message GetStaffMemberRequest {
  string user_id = 1;
  string clinic_id = 2;
}

message StaffMemberReply {
  string id = 1;
  string clinic_id = 2;
  string user_id = 3;
  string role = 4;
  string status = 5;
  string first_name = 6;
  string last_name = 7;
  string phone = 8;
  string email = 9;
  string specialization = 10;
  string avatar = 11;
  bool is_active = 12;
}

message GetWorkingHoursRequest {
  string clinic_id = 1;
}

message WorkingHoursEntry {
  string id = 1;
  string clinic_id = 2;
  int32 day_of_week = 3;
  string open_time = 4;
  string close_time = 5;
  bool is_closed = 6;
}

message WorkingHoursListReply {
  repeated WorkingHoursEntry entries = 1;
}

message CreateClinicRequest {
  string slug = 1;
  string name = 2;
  optional string phone = 3;
  optional string email = 4;
  optional string address = 5;
  optional string timezone = 6;
  optional string locale = 7;
}

message UpsertWorkingHoursRequest {
  string clinic_id = 1;
  repeated WorkingHoursEntryInput entries = 2;
}

message WorkingHoursEntryInput {
  int32 day_of_week = 1;
  optional string open_time = 2;
  optional string close_time = 3;
  bool is_closed = 4;
}

message CreateStaffMemberRequest {
  string clinic_id = 1;
  string role = 3;
  string first_name = 4;
  string last_name = 5;
  optional string phone = 6;
  string email = 7;
  optional string specialization = 8;
  optional string avatar = 9;
  string password = 10;
}

message ListStaffMembersRequest {
  string clinic_id = 1;
}

message StaffMembersListReply {
  repeated StaffMemberReply staff_members = 1;
}

message UpdateStaffMemberRequest {
  string staff_member_id = 1;
  string clinic_id = 2;
  optional string role = 3;
  optional string status = 4;
  optional string first_name = 5;
  optional string last_name = 6;
  optional string phone = 7;
  optional string specialization = 8;
  optional string avatar = 9;
}

message DeleteStaffMemberRequest {
  string staff_member_id = 1;
  string clinic_id = 2;
}

message DeleteStaffMemberReply {
  bool success = 1;
}
