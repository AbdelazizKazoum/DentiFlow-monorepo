syntax = "proto3";
package appointment;

service AppointmentService {
  rpc GetAppointment (GetAppointmentRequest) returns (AppointmentReply);
  rpc ListAppointments (ListAppointmentsRequest) returns (AppointmentsListReply);
  rpc CreateAppointment (CreateAppointmentRequest) returns (AppointmentReply);
  rpc UpdateAppointment (UpdateAppointmentRequest) returns (AppointmentReply);
  rpc UpdateAppointmentTiming (UpdateAppointmentTimingRequest) returns (AppointmentReply);
  rpc CheckAppointmentConflicts (CheckAppointmentConflictsRequest) returns (ConflictReply);

  rpc ListQueueEntries (ListQueueEntriesRequest) returns (QueueEntriesListReply);
  rpc GetQueueEntry (GetQueueEntryRequest) returns (QueueEntryReply);
  rpc CheckInPatient (CheckInPatientRequest) returns (QueueEntryReply);
  rpc UpdateQueueStatus (UpdateQueueStatusRequest) returns (QueueEntryReply);
  rpc UpdateQueueNotes (UpdateQueueNotesRequest) returns (QueueEntryReply);
}

message AppointmentReply {
  string id = 1;
  string clinic_id = 2;
  string patient_id = 3;
  string patient_name = 4;
  string patient_phone = 5;
  string doctor_id = 6;
  string doctor_name = 7;
  string start_at = 8;
  string end_at = 9;
  bool is_emergency = 10;
  string type = 11;
  string channel = 12;
  string status = 13;
  string notes = 14;
  string cancelled_at = 15;
  string cancellation_reason = 16;
  string created_by = 17;
  string created_at = 18;
  string updated_at = 19;
}

message AppointmentsListReply {
  repeated AppointmentReply appointments = 1;
  int32 total = 2;
}

message GetAppointmentRequest {
  string id = 1;
}

message ListAppointmentsRequest {
  string clinic_id = 1;
  optional int32 page = 2;
  optional int32 limit = 3;
  optional string start_date = 4;
  optional string end_date = 5;
  optional string doctor_id = 6;
  optional string status = 7;
}

message CreateAppointmentRequest {
  string clinic_id = 1;
  string patient_id = 2;
  string patient_name = 3;
  optional string patient_phone = 4;
  string doctor_id = 5;
  string doctor_name = 6;
  string start_at = 7;
  string end_at = 8;
  bool is_emergency = 9;
  optional string type = 10;
  string channel = 11;
  optional string status = 12;
  optional string notes = 13;
  optional string created_by = 14;
}

message UpdateAppointmentRequest {
  string appointment_id = 1;
  optional string patient_id = 2;
  optional string patient_name = 3;
  optional string patient_phone = 4;
  optional string doctor_id = 5;
  optional string doctor_name = 6;
  optional string start_at = 7;
  optional string end_at = 8;
  optional bool is_emergency = 9;
  optional string type = 10;
  optional string channel = 11;
  optional string status = 12;
  optional string notes = 13;
  optional string cancelled_at = 14;
  optional string cancellation_reason = 15;
}

message UpdateAppointmentTimingRequest {
  string appointment_id = 1;
  string doctor_id = 2;
  optional string doctor_name = 3;
  string new_start_at = 4;
  string new_end_at = 5;
}

message CheckAppointmentConflictsRequest {
  optional string clinic_id = 1;
  string doctor_id = 2;
  string start_at = 3;
  string end_at = 4;
  optional string exclude_status = 5;
  optional string exclude_appointment_id = 6;
}

message ConflictReply {
  bool has_conflict = 1;
}

message QueueEntryReply {
  string id = 1;
  string clinic_id = 2;
  string appointment_id = 3;
  string patient_id = 4;
  string patient_name = 5;
  string patient_phone = 6;
  string doctor_id = 7;
  string doctor_name = 8;
  string appointment_type = 9;
  string status = 10;
  string priority = 11;
  string queue_notes = 12;
  string arrived_at = 13;
  string called_at = 14;
  string seated_at = 15;
  string completed_at = 16;
  string updated_at = 17;
}

message QueueEntriesListReply {
  repeated QueueEntryReply queue_entries = 1;
}

message ListQueueEntriesRequest {
  string clinic_id = 1;
}

message GetQueueEntryRequest {
  string id = 1;
}

message CheckInPatientRequest {
  string clinic_id = 1;
  string appointment_id = 2;
  string patient_id = 3;
  string patient_name = 4;
  optional string patient_phone = 5;
  string doctor_id = 6;
  string doctor_name = 7;
  optional string appointment_type = 8;
  optional string priority = 9;
  optional string queue_notes = 10;
  optional string arrived_at = 11;
}

message UpdateQueueStatusRequest {
  string queue_entry_id = 1;
  string status = 2;
  optional string correction_reason = 3;
}

message UpdateQueueNotesRequest {
  string queue_entry_id = 1;
  optional string queue_notes = 2;
}
