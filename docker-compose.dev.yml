networks:
  dentiflow-network:
    driver: bridge

volumes:
  db_data:

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "secret"
      MYSQL_DATABASE: "dentiflow_db"
      TZ: UTC
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dentiflow-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: builder
      args:
        PNPM_FLAGS: "--no-frozen-lockfile"
    image: dentiflow/api-gateway:dev
    working_dir: /app
    command: pnpm -C ./services start:dev:api-gateway
    environment:
      NODE_ENV: development
      PORT: 3001
      LOG_LEVEL: info
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 900
      CHOKIDAR_USEPOLLING: "true"
      FORCE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      AUTH_SERVICE_URL: http://auth-service:3002
    ports:
      - "127.0.0.1:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/api-gateway/src:/app/services/api-gateway/src:rw
      - ./services/lib:/app/services/lib:rw
    depends_on:
      - db
      - auth-service
    networks:
      - dentiflow-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: builder
      args:
        PNPM_FLAGS: "--no-frozen-lockfile"
    image: dentiflow/auth-service:dev
    working_dir: /app
    command: pnpm -C ./services start:dev:auth-service
    environment:
      NODE_ENV: development
      PORT: 3002
      LOG_LEVEL: info
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: secret
      DB_NAME: dentiflow_db
      JWT_SECRET: change-me-to-a-secure-random-string-of-at-least-32-characters
      JWT_EXPIRES_IN: 900
      REFRESH_TOKEN_SECRET: change-me-refresh-secret-at-least-32-characters
      REFRESH_TOKEN_EXPIRES_IN: 604800
      GRPC_PORT: 5001
      CHOKIDAR_USEPOLLING: "true"
      FORCE_POLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "127.0.0.1:3002:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/auth-service/src:/app/services/auth-service/src:rw
      - ./services/lib:/app/services/lib:rw
    depends_on:
      - db
    networks:
      - dentiflow-network
