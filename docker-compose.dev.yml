networks:
  dentiflow-network:
    driver: bridge

volumes:
  db_data:
  api_node_modules:
  auth_node_modules:

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "secret"
      MYSQL_DATABASE: "dentiflow_db"
      MYSQL_USER: "root"
      MYSQL_PASSWORD: "secret"
      TZ: UTC
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dentiflow-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      args:
        PNPM_FLAGS: "--no-frozen-lockfile"
    image: dentiflow/api-gateway:dev
    user: root
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install -C ./services --no-frozen-lockfile || true && pnpm -C ./services start:dev:api-gateway"
    environment:
      NODE_ENV: development
      PORT: 3001
      LOG_LEVEL: info
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 900
      # Ensure watchers work on Windows & Linux
      CHOKIDAR_USEPOLLING: "true"
      FORCE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      # Point to auth service inside compose network
      AUTH_SERVICE_URL: http://auth-service:3002
    ports:
      - "127.0.0.1:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app:rw
      - api_node_modules:/app/node_modules
    depends_on:
      - db
      - auth-service
    networks:
      - dentiflow-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      args:
        PNPM_FLAGS: "--no-frozen-lockfile"
    image: dentiflow/auth-service:dev
    user: root
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install -C ./services --no-frozen-lockfile || true && pnpm -C ./services start:dev:auth-service"
    environment:
      NODE_ENV: development
      PORT: 3002
      LOG_LEVEL: info
      # DB config for local dev: connect to the mysql container
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: secret
      DB_NAME: dentiflow_db
      JWT_SECRET: change-me-to-a-secure-random-string-of-at-least-32-characters
      JWT_EXPIRES_IN: 900
      # Make file watchers reliable in mounted volumes on Windows and Linux
      CHOKIDAR_USEPOLLING: "true"
      FORCE_POLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "127.0.0.1:3002:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app:rw
      - auth_node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - dentiflow-network
